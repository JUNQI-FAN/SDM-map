ith et al. 2011). Using L1 regularization.","children":[],"payload":{"tag":"li","lines":"41,42"}}],"payload":{"tag":"li","lines":"40,42"}},{"content":"MaxNet","children":[],"payload":{"tag":"li","lines":"42,43"}}],"payload":{"tag":"li","lines":"32,43"}},{"content":"Tree-based model:","children":[{"content":"<em>Classification and regression trees are nonlinear (and nonparametric) models that recursively partition (&#x201c;split&#x201d;) the predictor space into sections with similar values of the response variable</em> (Elith et al., 2019).","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<em>Often highly effective for prediction</em> (Hastie et al. 2009).","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"<em>Valavi et al., 2022 provided tuned model based on the presence-background training data.</em>","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"Boosted Regression Trees (BRT)","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"XGBoost","children":[],"payload":{"tag":"li","lines":"48,49"}},{"content":"Random Forests (RF)","children":[{"content":"<em>Not very sensitive to tuning the model parameters</em> (Strobl et al. 2009, Freeman et al. 2016).","children":[],"payload":{"tag":"li","lines":"50,51"}}],"payload":{"tag":"li","lines":"49,51"}},{"content":"Conditional Inference Forest (cforest)","children":[],"payload":{"tag":"li","lines":"51,52"}}],"payload":{"tag":"li","lines":"43,52"}},{"content":"Envelop models","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"Other models","children":[{"content":"Support Vector Machine (SVM)","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"biomod","children":[{"content":"Including ten fixed algorithms and combine them.","children":[],"payload":{"tag":"li","lines":"56,57"}}],"payload":{"tag":"li","lines":"55,57"}},{"content":"Custom ensemble","children":[{"content":"<em>Working better than biomod.</em> (Valavi et al., 2022).","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"<em>Given evidence in the tree ensemble literature that ensembles work best when the component models are not highly correlated (Elith 2019)... We targeted methods we expected (based on our experience) to do well. The chosen models were Lasso, GAM, MaxEnt, BRT, and one of the RF variants (down-sampled)... Their predictions were all rescaled between 0 and 1 and their (unweighted) average used to build the ensemble model.</em> (Valavi et al., 2022).","children":[],"payload":{"tag":"li","lines":"59,60"}}],"payload":{"tag":"li","lines":"57,60"}}],"payload":{"tag":"li","lines":"53,60"}}],"payload":{"tag":"h3","lines":"31,32"}},{"content":"Calibrating","children":[{"content":"<em>predictions based on presence-only species data are not expected to be well calibrated</em> (Valavi et al., 2022).","children":[],"payload":{"tag":"li","lines":"62,63"}}],"payload":{"tag":"h3","lines":"61,62"}},{"content":"Parameter tuning (for parameter and semi-parameter models)","children":[],"payload":{"tag":"h3","lines":"63,64"}},{"content":"Ensembling models","children":[],"payload":{"tag":"h3","lines":"64,65"}}],"payload":{"tag":"h2","lines":"30,31"}},{"content":"<strong>5. Model prediction</strong>","children":[],"payload":{"tag":"h2","lines":"68,69"}},{"content":"<strong>6. Model evaluation</strong>","children":[{"content":"Indices","children":[{"content":"<em>Different index when different application.</em>","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"Evaluating continuous output (suitability)","children":[{"content":"Metrics requiring absence records","children":[{"content":"AUC-ROC (Area under receiver operating characteristic curve)","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"AUC-PR (Area under precision-recall curve)","children":[{"content":"<em>AUC-PR is often preferred to AUC-ROC where the number of negatives (absences) is much larger than positives</em> (presences; Flach an
